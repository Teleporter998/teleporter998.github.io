<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleporter998 — Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="light-glow" id="ambientLight"></div>

  <div class="viewport">
    <div class="scene" id="scene">
      <div class="tunnel">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
    </div>
  </div>

  <main class="container" id="container">
    
    <div class="glass-card">
      <div class="card-glow"></div>
      
      <div class="status-badge">
        <span class="pulse-dot"></span>
        Available for Projects
      </div>
      
      <h1 class="name">Hello, I'm <span>Teleporter998</span></h1>
      <p class="subtitle">Creative Developer & Designer</p>
      
      <p class="description">
        Building high-fidelity interactive digital experiences, specialized optimization, and full-stack architecture.
      </p>

      <div class="buttons">
        <a href="#" class="btn">
          <span class="btn-bg"></span>
          <span class="btn-face">View Projects</span>
        </a>
        <a href="#" class="btn">
          <span class="btn-bg"></span>
          <span class="btn-face">Contact Me</span>
        </a>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
