<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleporter998</title>

  <link rel="icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎬 Background -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="assets/GlitchBackground.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="vignette"></div>

  <!-- 🚀 HERO -->
  <section id="hero">
    <main class="container">
      <div class="profile-card">
        <h1 class="name">Hello, I'm <span>Teleporter998</span></h1>
        <p class="subtitle">Game Developer &amp; Music Producer</p>
        <div class="buttons">
          <a href="#projects" class="btn btn-primary">View Projects</a>
          <a href="#contact" class="btn btn-secondary">Contact Me</a>
        </div>
      </div>
    </main>
  </section>

  <!-- 🎨 PROJECTS -->
  <section id="projects" class="portfolio-section">
    <div class="section-header">
      <h2>UI & <span>Graphics</span></h2>
      <p>A collection of my interface designs and visual assets.</p>
    </div>

    <div class="project-grid">
      <div class="project-card"><img src="assets/CriticizeDesign.png" class="project-img" loading="lazy" draggable="false"></div>
      <div class="project-card"><img src="assets/ExpertionDesign.png" class="project-img" loading="lazy" draggable="false"></div>
      <div class="project-card"><img src="assets/FrozenInsideDesign.png" class="project-img" loading="lazy" draggable="false"></div>
      <div class="project-card"><img src="assets/HydrogenDesign.png" class="project-img" loading="lazy" draggable="false"></div>
      <div class="project-card"><img src="assets/ToxicityDesign.png" class="project-img" loading="lazy" draggable="false"></div>
      <div class="project-card"><img src="assets/ValidDate.png" class="project-img" loading="lazy" draggable="false"></div>
      <div class="project-card"><img src="assets/Tiers.png" class="project-img" loading="lazy" draggable="false"></div>
    </div>
  </section>

  <!-- 🔍 LIGHTBOX -->
  <div id="lightbox" class="lightbox">
    <span class="close-btn">&times;</span>
    <button class="nav-btn prev-btn">&#10094;</button>
    <img src="" class="lightbox-content" draggable="false">
    <button class="nav-btn next-btn">&#10095;</button>
  </div>

<script>
/* =========================
   HERO INTERACTION
========================= */
(function () {
  const card = document.querySelector('.profile-card');
  if (!card) return;

  card.addEventListener('pointermove', function (e) {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
    card.style.setProperty('--my', (e.clientY - rect.top) + 'px');
  });
})();

/* =========================
   MASONRY ENGINE (FIXED)
========================= */
const grid = document.querySelector('.project-grid');
let items = [];

function initItems() {
  items = Array.from(document.querySelectorAll('.project-card'));
}

function createMasonry() {
  if (!grid) return;

  // Save items BEFORE clearing
  if (items.length === 0) initItems();

  grid.innerHTML = '';

  const columnCount =
    window.innerWidth > 1024 ? 4 :
    window.innerWidth > 768 ? 3 :
    window.innerWidth > 480 ? 2 : 1;

  const columns = [];
  const heights = new Array(columnCount).fill(0);

  for (let i = 0; i < columnCount; i++) {
    const col = document.createElement('div');
    col.className = 'project-column';
    grid.appendChild(col);
    columns.push(col);
  }

  items.forEach(item => {
    const shortest = heights.indexOf(Math.min(...heights));
    columns[shortest].appendChild(item);
    heights[shortest] += item.offsetHeight;
  });
}

/* Wait for images so heights are correct */
window.addEventListener('load', () => {
  initItems();
  createMasonry();
});

/* =========================
   LIGHTBOX (FIXED)
========================= */
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.querySelector('.lightbox-content');

function refreshImages() {
  return Array.from(document.querySelectorAll('.project-img'));
}

let currentIndex = 0;

function openLightbox(index) {
  const imgs = refreshImages();
  currentIndex = index;
  lightboxImg.src = imgs[currentIndex].src;
  lightbox.style.display = 'flex';
}

document.addEventListener('click', (e) => {
  const imgs = refreshImages();
  imgs.forEach((img, index) => {
    if (e.target === img) openLightbox(index);
  });

  if (e.target === lightbox || e.target.classList.contains('close-btn')) {
    lightbox.style.display = 'none';
  }
});

document.querySelector('.next-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const imgs = refreshImages();
  currentIndex = (currentIndex + 1) % imgs.length;
  lightboxImg.src = imgs[currentIndex].src;
});

document.querySelector('.prev-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const imgs = refreshImages();
  currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
  lightboxImg.src = imgs[currentIndex].src;
});

document.addEventListener('keydown', (e) => {
  if (lightbox.style.display === 'flex') {
    const imgs = refreshImages();
    if (e.key === 'ArrowRight') {
      currentIndex = (currentIndex + 1) % imgs.length;
      lightboxImg.src = imgs[currentIndex].src;
    }
    if (e.key === 'ArrowLeft') {
      currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
      lightboxImg.src = imgs[currentIndex].src;
    }
    if (e.key === 'Escape') lightbox.style.display = 'none';
  }
});

/* =========================
   DISABLE RIGHT-CLICK ON GALLERY + LIGHTBOX IMAGES
   (deterrent only — not a hard guarantee against saving)
========================= */
function blockContextMenu(el) {
  el.addEventListener('contextmenu', (e) => e.preventDefault());
}

// Gallery thumbnails (bound once; moving them between columns
// during createMasonry() doesn't remove their listeners)
refreshImages().forEach(blockContextMenu);

// Lightbox image (same <img> element reused for every slide)
blockContextMenu(lightboxImg);

/* =========================
   SMOOTH SCROLL
========================= */
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    e.preventDefault();
    document.querySelector(this.getAttribute('href')).scrollIntoView({
      behavior: 'smooth'
    });
  });
});
</script>

</body>
</html>
