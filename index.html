<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleporter998 — Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 3D background -->
  <div class="viewport">
    <div class="scene" id="scene">
      <div class="tunnel">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>
        <div class="ring r5"></div>
        <div class="ring r6"></div>

        <!-- particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
    </div>
  </div>

  <!-- content -->
  <main class="container" id="container">
    <h1 class="name">Hello, I'm <span>Teleporter998</span></h1>

    <p class="subtitle">
      Coming soon...
    </p>

    <div class="buttons">
      <a href="#" class="btn">
        <span class="btn-face">View Projects</span>
      </a>

      <a href="#" class="btn">
        <span class="btn-face">Contact Me</span>
      </a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
