<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleporter998</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<section id="projects" class="portfolio-section">
  <div class="section-header">
    <h2>UI & <span>Graphics</span></h2>
    <p>A collection of my interface designs and visual assets.</p>
  </div>

  <div class="project-grid">
    <div class="project-card"><img src="assets/CriticizeDesign.png" class="project-img" loading="lazy"></div>
    <div class="project-card"><img src="assets/ExpertionDesign.png" class="project-img" loading="lazy"></div>
    <div class="project-card"><img src="assets/FrozenInsideDesign.png" class="project-img" loading="lazy"></div>
    <div class="project-card"><img src="assets/HydrogenDesign.png" class="project-img" loading="lazy"></div>
    <div class="project-card"><img src="assets/ToxicityDesign.png" class="project-img" loading="lazy"></div>
  </div>
</section>

<script>
const grid = document.querySelector('.project-grid');
const items = Array.from(document.querySelectorAll('.project-card'));

function createMasonry() {
  grid.innerHTML = '';

  const columnCount =
    window.innerWidth > 1024 ? 4 :
    window.innerWidth > 768 ? 3 :
    window.innerWidth > 480 ? 2 : 1;

  const columns = [];
  const heights = new Array(columnCount).fill(0);

  // Create columns
  for (let i = 0; i < columnCount; i++) {
    const col = document.createElement('div');
    col.className = 'project-column';
    grid.appendChild(col);
    columns.push(col);
  }

  // Distribute items
  items.forEach(item => {
    const shortest = heights.indexOf(Math.min(...heights));
    columns[shortest].appendChild(item);

    heights[shortest] += item.offsetHeight;
  });
}

// Run after everything loads
window.addEventListener('load', createMasonry);

// Recalculate on resize
window.addEventListener('resize', () => {
  clearTimeout(window.resizeTimeout);
  window.resizeTimeout = setTimeout(createMasonry, 200);
});
</script>

</body>
</html>
